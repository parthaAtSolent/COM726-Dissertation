<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Uploader</title>

  <style>
/* ══════════════════════════════════════════════════════════════════════
   app/static/css/file_uploader.css
   Styles for the custom drag-and-drop file uploader component.
   ══════════════════════════════════════════════════════════════════════ */

/* ── Reset ────────────────────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: transparent;
  overflow: hidden;
}

/* ── Drop zone ────────────────────────────────────────────────────── */
#drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;

  width: 100%;
  min-height: 130px;
  padding: 18px 12px;

  border: 2px dashed rgba(108, 99, 255, 0.40);
  border-radius: 10px;
  background: rgba(108, 99, 255, 0.06);

  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.1s;
  user-select: none;
}

#drop-zone:hover,
#drop-zone.hover {
  border-color: rgba(108, 99, 255, 0.75);
  background: rgba(108, 99, 255, 0.13);
  transform: scale(1.01);
}

#drop-zone.dragging {
  border-color: #6C63FF;
  background: rgba(108, 99, 255, 0.20);
  transform: scale(1.02);
}

/* ── Icon ─────────────────────────────────────────────────────────── */
#upload-icon {
  font-size: 2rem;
  line-height: 1;
  transition: transform 0.15s;
}

#drop-zone:hover #upload-icon,
#drop-zone.hover #upload-icon {
  transform: translateY(-3px);
}

/* ── Labels ───────────────────────────────────────────────────────── */
#main-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: #b0aad4;
  text-align: center;
}

#sub-label {
  font-size: 0.72rem;
  color: rgba(176, 170, 212, 0.65);
  text-align: center;
}

/* ── Browse button ────────────────────────────────────────────────── */
#browse-btn {
  margin-top: 6px;
  padding: 5px 16px;
  font-size: 0.76rem;
  font-weight: 600;
  letter-spacing: 0.3px;

  background: rgba(108, 99, 255, 0.18);
  color: #c4c0ff;
  border: 1px solid rgba(108, 99, 255, 0.45);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}

#browse-btn:hover {
  background: rgba(108, 99, 255, 0.32);
  border-color: rgba(108, 99, 255, 0.70);
}

/* ── Hidden native file input ─────────────────────────────────────── */
#file-input {
  display: none;
}

/* ── File chips (staged files) ────────────────────────────────────── */
#file-list {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
}

.file-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 10px;
  background: rgba(108, 99, 255, 0.12);
  border: 1px solid rgba(108, 99, 255, 0.28);
  border-radius: 6px;
  font-size: 0.75rem;
  color: #c4c0ff;
  gap: 6px;
}

.file-chip .chip-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-chip .chip-size {
  flex-shrink: 0;
  color: rgba(196, 192, 255, 0.55);
  font-size: 0.68rem;
}

.file-chip .chip-remove {
  flex-shrink: 0;
  cursor: pointer;
  color: rgba(196, 192, 255, 0.55);
  font-size: 0.9rem;
  line-height: 1;
  transition: color 0.1s;
}

.file-chip .chip-remove:hover {
  color: #ff6b6b;
}

/* ── Progress bar ─────────────────────────────────────────────────── */
#progress-wrap {
  display: none;
  width: 100%;
  height: 4px;
  background: rgba(108, 99, 255, 0.15);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background: #6C63FF;
  border-radius: 2px;
  transition: width 0.2s ease;
}
</style>

</head>

<body>

  <!-- ── Drop zone ──────────────────────────────────────────────── -->
  <div id="drop-zone" role="button" tabindex="0" aria-label="File upload area">

    <div id="upload-icon">📁</div>

    <!-- Text is overridden at runtime via JS render-args from Python -->
    <div id="main-label">Drop files here or click to browse</div>
    <div id="sub-label">Accepted: .pdf, .txt · Max 10 files</div>

    <button id="browse-btn" type="button">Browse files</button>

    <!-- Native picker — hidden, triggered by the button or zone click -->
    <input id="file-input" type="file" multiple accept=".pdf,.txt" />
  </div>

  <!-- ── Encode progress ────────────────────────────────────────── -->
  <div id="progress-wrap">
    <div id="progress-bar"></div>
  </div>

  <!-- ── Staged-file chips rendered here by JS ──────────────────── -->
  <div id="file-list"></div>

  <script>
/* ══════════════════════════════════════════════════════════════════════
   app/static/js/file_uploader.js
   All interactivity for the custom drag-and-drop file uploader.

   Communicates with Python via Streamlit's component postMessage API:
     • streamlit:componentReady  – signals the component is initialised
     • streamlit:setFrameHeight  – keeps the iframe sized to its content
     • streamlit:setComponentValue – sends file data back to Python as:
         [{ name, mime, size, b64 }, ...]
   ══════════════════════════════════════════════════════════════════════ */

/* ── Streamlit helpers ────────────────────────────────────────────── */

/**
 * Send a value back to the Python layer.
 * @param {Array|null} value
 */
function toStreamlit(value) {
  window.parent.postMessage(
    { isStreamlitMessage: true, type: "streamlit:setComponentValue", value },
    "*"
  );
}

/**
 * Resize the iframe to fit the current content height.
 */
function syncHeight() {
  const h = document.documentElement.scrollHeight || document.body.scrollHeight;
  window.parent.postMessage(
    { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h + 8 },
    "*"
  );
}

// Announce readiness to Streamlit
window.parent.postMessage(
  { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
  "*"
);

/* ── Component state ──────────────────────────────────────────────── */
let acceptedTypes = ["pdf", "txt"];   // overridden by render args
let maxFiles      = 10;
let pendingFiles  = [];               // [{ id: int, file: File }]
let uidCounter    = 0;

function uid() { return ++uidCounter; }

/* ── DOM refs ─────────────────────────────────────────────────────── */
const dropZone     = document.getElementById("drop-zone");
const browseBtn    = document.getElementById("browse-btn");
const fileInput    = document.getElementById("file-input");
const fileList     = document.getElementById("file-list");
const progressWrap = document.getElementById("progress-wrap");
const progressBar  = document.getElementById("progress-bar");
const uploadIcon   = document.getElementById("upload-icon");
const mainLabel    = document.getElementById("main-label");
const subLabel     = document.getElementById("sub-label");

/* ── Receive render args from Streamlit ───────────────────────────── */
window.addEventListener("message", function (event) {
  const msg = event.data;
  if (!msg || msg.type !== "streamlit:render") return;

  const args = msg.args || {};

  if (Array.isArray(args.accepted_types) && args.accepted_types.length) {
    acceptedTypes       = args.accepted_types;
    fileInput.accept    = acceptedTypes.map(t => "." + t).join(",");
  }
  if (args.max_files)  maxFiles           = args.max_files;
  if (args.icon)       uploadIcon.textContent = args.icon;
  if (args.label)      mainLabel.textContent  = args.label;

  subLabel.textContent =
    "Accepted: " + acceptedTypes.map(t => "." + t).join(", ") +
    " · Max " + maxFiles + " files";

  syncHeight();
});

/* ── Utilities ────────────────────────────────────────────────────── */

function fmtSize(bytes) {
  if (bytes < 1024)         return bytes + " B";
  if (bytes < 1024 * 1024)  return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

/* ── Render staged-file chips ─────────────────────────────────────── */
function renderChips() {
  fileList.innerHTML = "";

  pendingFiles.forEach(function ({ id, file }) {
    const chip = document.createElement("div");
    chip.className = "file-chip";
    chip.innerHTML =
      '<span class="chip-name" title="' + file.name + '">' + file.name + "</span>" +
      '<span class="chip-size">' + fmtSize(file.size) + "</span>" +
      '<span class="chip-remove" data-id="' + id + '" title="Remove">✕</span>';
    fileList.appendChild(chip);
  });

  fileList.querySelectorAll(".chip-remove").forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      const removeId = parseInt(this.dataset.id, 10);
      pendingFiles = pendingFiles.filter(function (f) { return f.id !== removeId; });
      renderChips();
      if (pendingFiles.length === 0) toStreamlit(null);
      syncHeight();
    });
  });

  syncHeight();
}

/* ── Base64-encode files then send to Python ──────────────────────── */
function encodeAndSend() {
  if (pendingFiles.length === 0) return;

  progressWrap.style.display = "block";
  progressBar.style.width    = "0%";

  const results = [];
  let   done    = 0;
  const total   = pendingFiles.length;

  pendingFiles.forEach(function ({ file }) {
    const reader = new FileReader();

    reader.onload = function (e) {
      // e.target.result  →  "data:<mime>;base64,<data>"
      const b64 = e.target.result.split(",")[1];
      results.push({ name: file.name, mime: file.type || "application/octet-stream", size: file.size, b64: b64 });

      done++;
      progressBar.style.width = Math.round((done / total) * 100) + "%";

      if (done === total) {
        setTimeout(function () {
          progressWrap.style.display = "none";
          progressBar.style.width    = "0%";
        }, 400);
        toStreamlit(results);   // ← Python receives this
      }
    };

    reader.readAsDataURL(file);
  });
}

/* ── Merge new File objects, dedup, respect limits ────────────────── */
function addFiles(newFiles) {
  const allowed = acceptedTypes.map(function (t) { return t.toLowerCase(); });

  Array.from(newFiles).forEach(function (file) {
    const ext = file.name.split(".").pop().toLowerCase();
    if (!allowed.includes(ext))    return;
    if (pendingFiles.length >= maxFiles) return;
    const dup = pendingFiles.some(function (f) {
      return f.file.name === file.name && f.file.size === file.size;
    });
    if (!dup) pendingFiles.push({ id: uid(), file: file });
  });

  renderChips();
  encodeAndSend();
}

/* ── Event listeners ──────────────────────────────────────────────── */

// Click on drop-zone body → open picker (but not on chips)
dropZone.addEventListener("click", function (e) {
  if (e.target === browseBtn || e.target.closest(".chip-remove")) return;
  fileInput.click();
});

browseBtn.addEventListener("click", function (e) {
  e.stopPropagation();
  fileInput.click();
});

fileInput.addEventListener("change", function () {
  addFiles(this.files);
  this.value = "";   // reset so same file can be reselected after removal
});

// Keyboard accessibility on the drop-zone
dropZone.addEventListener("keydown", function (e) {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    fileInput.click();
  }
});

// Drag-and-drop
dropZone.addEventListener("dragover",  function (e) { e.preventDefault(); this.classList.add("dragging"); });
dropZone.addEventListener("dragleave", function ()  { this.classList.remove("dragging"); });
dropZone.addEventListener("drop",      function (e) {
  e.preventDefault();
  this.classList.remove("dragging");
  addFiles(e.dataTransfer.files);
});

// Initial height sync once the DOM is ready
window.addEventListener("load", syncHeight);
</script>

</body>
</html>
