<!--
  templates/chat.html
  ────────────────────
  HTML fragments for the main chat view.
-->

<!-- ── Routing info badge ──────────────────────────────────────────────── -->
<div class="routing-badge">
    🤖 <strong>{model_name}</strong> &nbsp;·&nbsp; 📌 {reason}
</div>

<!-- ── Empty-state shown when no messages ──────────────────────────────── -->
<div class="empty-state">
    <div class="empty-icon">💬</div>
    <p class="empty-title">Start a conversation</p>
    <p class="empty-sub">Type a message below to begin chatting with the AI.</p>
</div>

<!-- ── Animation frames container (JS will cycle these) ────────────────── -->
<div id="cooking-loader" class="cooking-loader" style="display: none;">
    <span class="cooking-emoji">👩🏻‍🍳</span>
    <span class="cooking-text">Bro's cooking. Let him cook 🔥</span>
</div>
